name: Backend CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]  # Test on two latest Node.js LTS versions

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'  # Caches node_modules for faster subsequent builds

    - name: Install dependencies
      run: npm ci  # Uses package-lock.json for deterministic builds

    - name: Run linter
      run: npm run lint --if-present  # Runs if a lint script exists

    - name: Run tests
      run: npm test --if-present  # Runs if a test script exists
